# ============================================================================
# deploy-main.yml — 兩段式部署主站到 Oracle A1
# ----------------------------------------------------------------------------
# 設計:
#   job 1「build」在 GitHub-hosted(amd64)build 靜態站 + 產 PDF,輸出成 artifact。
#   job 2「deploy」在 self-hosted ARM runner 下載 artifact,rsync 到 /srv/main(零入站)。
#
# 為什麼把 build/PDF 放 hosted、deploy 放 self-hosted:
#   - Chrome for Testing 沒有官方 Linux ARM64 版,puppeteer 在 ARM 上會抓到 x64 Chrome
#     無法執行(chrome: Syntax error / 無法 launch)。放 amd64 hosted 產 PDF 最乾淨。
#   - 正式機是小台 ARM(2 OCPU/12GB),把 build 與 Chrome 移走,正式機只做輕量 rsync。
#   - 這正是企業常見分工:「CI 建置產物 → 具正式環境存取的 runner 部署」。
#   - deploy 仍在 self-hosted、主動連出、零入站,維持 Tunnel 的安全哲學。
#
# 教學交叉連結:docs/20(Actions/runner)、docs/21(path-filtered)、docs/22(self-hosted runner)。
# ============================================================================

name: Deploy main

on:
  # 手動觸發(Actions 頁面)
  workflow_dispatch:
  # 只在 push 進 main、且「主站相關路徑」變動時才部署(path-filtered 解耦)
  push:
    branches: [main]
    paths:
      - "apps/main/**"
      - "packages/ui/**"
      - "content/**"
      - ".github/workflows/deploy-main.yml"

# 同一分支的部署排隊、不互相取消(避免 rsync 到一半被打斷)
concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # --- job 1:在 hosted amd64 build + 產 PDF,輸出 artifact ---------------------
  build:
    name: Build + PDF (hosted amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack (pin pnpm to packageManager)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (main, static export)
        run: pnpm --filter main run build

      # PDF:amd64 上 Chrome for Testing 正常;另裝 CJK 字型,雙語履歷的中文才不會變方框。
      - name: Install CJK fonts + Chrome for Puppeteer
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          pnpm --filter main exec puppeteer browsers install chrome

      - name: Generate resume PDFs
        continue-on-error: true
        run: |
          npx --yes serve apps/main/out --listen 4173 --single &
          SERVE_PID=$!
          for i in $(seq 1 30); do curl -fsS -o /dev/null "http://localhost:4173/" && break; sleep 1; done
          BASE_URL=http://localhost:4173 pnpm --filter main run generate-pdf
          kill "$SERVE_PID" 2>/dev/null || true

      - name: Merge PDFs into out/ (best-effort)
        run: |
          for f in resume-zh.pdf resume-en.pdf; do
            if [ -f "apps/main/public/$f" ]; then
              cp "apps/main/public/$f" "apps/main/out/$f"; echo "merged $f"
            else
              echo "skip (not generated): $f"
            fi
          done

      - name: Upload built site (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: main-out
          path: apps/main/out
          retention-days: 3
          if-no-files-found: error

  # --- job 2:在 self-hosted ARM runner 部署(零 build / 零 Chrome / 零入站)-----
  deploy:
    name: Deploy to /srv/main (self-hosted ARM)
    needs: build
    # 部署閘門:未設 DEPLOY_ENABLED=true 時整個 deploy job 跳過(不失敗)。
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    runs-on: [self-hosted, linux, ARM64]
    steps:
      # 取得 repo 以使用 infra/scripts/deploy-static.sh(out/ 不在 repo,改由 artifact 帶入)
      - uses: actions/checkout@v4

      - name: Download built site (artifact)
        uses: actions/download-artifact@v4
        with:
          name: main-out
          path: apps/main/out

      # rsync apps/main/out → /srv/main,再帶 Host 打 127.0.0.1:8080/healthz 確認 200。
      - name: Deploy + health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          chmod +x infra/scripts/deploy-static.sh
          ./infra/scripts/deploy-static.sh main

      # 部署後清 Cloudflare 邊緣快取,讓更新立即可見(免手動 purge)。
      # best-effort:未設定 secret/variable 時略過,不影響部署。
      # 需要:repo secret CF_API_TOKEN(權限 Zone → Cache Purge)+ repo variable CF_ZONE_ID。
      - name: Purge Cloudflare cache
        continue-on-error: true
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ vars.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "CF_API_TOKEN / CF_ZONE_ID 未設定,略過 purge"; exit 0
          fi
          curl -fsS -X POST "https://api.cloudflare.com/client/v4/zones/$CF_ZONE_ID/purge_cache" \
            -H "Authorization: Bearer $CF_API_TOKEN" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | head -c 300; echo

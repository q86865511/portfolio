# ============================================================================
# deploy-main.yml — 只部署「主站 apps/main」到 Oracle A1 主機
# ----------------------------------------------------------------------------
# 角色:當「會影響主站產物」的東西被 push 進 main,就在主機上 build 主站、
#       產生 PDF 履歷、用 deploy-static.sh 把 apps/main/out 同步到 /srv/main,
#       並做健康檢查。這是「真正寫入正式環境」的 workflow。
#
# 為什麼 runs-on 是 self-hosted + linux + ARM64?
#   1) 零入站、與 Tunnel 哲學一致:主機完全不開任何入站埠(80/443 都沒開,見 docs/11)。
#      self-hosted runner 是「主機主動連出」去 GitHub 領工作的——和 cloudflared 主動連出
#      建立 Tunnel 是同一個思路:外面永遠連不進來,連線方向永遠是「由內向外」。
#      因此部署不需要任何 SSH / 對外開埠;runner 就在主機本機,build 完直接寫 /srv。
#   2) runner 與 Caddy 同機:deploy-static.sh 用 rsync 寫 /srv/main、再 curl
#      127.0.0.1:8080 做健康檢查——這些都必須「在主機本機」才做得到。
#   3) ARM 原生:主機是 Oracle A1(ARM64)。在 ARM 上 build,產物與執行環境一致,
#      日後若有需要原生相依的動態 app 也不會踩 x86/ARM 差異。
#
#   labels 對應:在主機註冊 runner 時要掛上 self-hosted, linux, ARM64 三個 label
#   (註冊步驟見 docs/22-self-hosted-arm-runner.md)。三個 label 同時符合才會被排到這台。
#
# 為什麼「不需要任何 secrets」?
#   runner 就在主機上,以本機檔案系統權限寫 /srv/main(runner 使用者需有 /srv 寫入權,
#   見 docs/22 的權限強化)。沒有跨機傳輸,所以不需要 SSH 金鑰、不需要部署 token。
#
#   替代方案(GitHub-hosted x86 + 透過 cloudflared access SSH 部署)需要哪些 secrets?
#     - CF_ACCESS_CLIENT_ID / CF_ACCESS_CLIENT_SECRET:Cloudflare Access service token,
#       讓 GitHub runner 能通過 Zero Trust 認證、用 `cloudflared access ssh` 連進主機。
#     - SSH_PRIVATE_KEY:連入主機部署使用者的私鑰。
#     - SSH_KNOWN_HOSTS / DEPLOY_HOST / DEPLOY_USER:主機指紋與連線目標。
#   那條路要把產物 scp / rsync over ssh 過去再遠端跑 deploy 腳本——多了金鑰管理與一個
#   對外(經 Tunnel)的 SSH 入口。本專案選 self-hosted 正是為了「零這些 secrets」。
#   取捨與完整對照見 docs/20 第 4 節與 docs/22 最後一節。
#
# 教學交叉連結:
#   - 整體架構與「self-hosted ARM vs hosted」取捨:docs/00-architecture-overview.md §3.5
#   - GitHub Actions 基本 / runner / secrets:docs/20-cicd-github-actions.md
#   - paths 過濾如何讓「改 docs/infra 不會觸發主站部署」:docs/21-path-filtered-pipelines.md
#   - 註冊 self-hosted ARM runner、安全強化:docs/22-self-hosted-arm-runner.md
#   - 部署最終落點(Caddy /srv/main、健康檢查):docs/12-caddy-origin.md
# ============================================================================

name: Deploy main

# --- 觸發條件 ----------------------------------------------------------------
# 只在 push 進 main 時部署(PR 不部署——PR 只跑 ci.yml 的驗證)。
#
# paths 過濾(體現「path-filtered 解耦」):
#   只有真的會改變「主站產物」的路徑才觸發本次部署:
#     - apps/main/**   主站本身
#     - packages/ui/** 主站用到的共用設計系統(改它,主站外觀會變)
#     - content/**     主站讀的內容(projects.json 等)
#     - 本檔            部署流程本身改動時
#   反過來說:只改 docs/ 或 infra/(Caddyfile、cloudflared 設定、deploy 腳本以外的)
#   或別的子站(apps/soulshard/**)時,「不會」觸發主站部署。每個子站各有自己
#   paths 過濾的 workflow,彼此獨立 build / deploy(monorepo 解耦,見 docs/21)。
on:
  # 手動觸發:runner 與網域就緒後,可在 Actions 頁面手動跑一次驗證部署。
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/main/**"
      - "packages/ui/**"
      - "content/**"
      - ".github/workflows/deploy-main.yml"

# --- concurrency:同一 ref 不並行,但「不互相取消」---------------------------
# 部署是「寫入正式環境」的動作,半途被取消可能讓 /srv/main 處於 rsync 到一半的狀態。
# 因此:
#   - group 以 ref 區分(main 的部署排成一列)。
#   - cancel-in-progress: false → 後來的部署「排隊等前一個跑完」,絕不打斷進行中的部署。
# (這跟 ci.yml 相反:CI 可以、也應該取消舊的;部署則必須跑完。)
concurrency:
  group: deploy-main-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + Deploy main to /srv/main
    # 部署閘門:預設「跳過」(skipped),而非失敗。
    #   在 self-hosted ARM runner 尚未註冊、網域尚未接好之前,若直接讓本 job 排程,
    #   會因為「找不到符合 labels 的 runner」而讓整次 push 顯示失敗(startup_failure)。
    #   因此用 job-level if 當開關:vars.DEPLOY_ENABLED 未設(預設)→ 條件為 false → job 直接 skipped,
    #   完全不需要 runner、不會失敗。
    #   啟用方式(Phase 5 完成後):repo Settings → Secrets and variables → Actions → Variables
    #   新增 DEPLOY_ENABLED=true,之後 push 到 main 才會真正部署(詳見 docs/22)。
    if: ${{ vars.DEPLOY_ENABLED == 'true' }}
    # self-hosted ARM runner,三個 label 全中才會排到主機這台(理由見檔頭)。
    runs-on: [self-hosted, linux, ARM64]

    steps:
      # 1) 取出原始碼到 runner 的工作目錄(就在主機本機上)。
      - name: Checkout
        uses: actions/checkout@v4

      # 2) 啟用 corepack,鎖定 pnpm 版本到 package.json 的 packageManager(pnpm@11.1.2)。
      #    note:self-hosted runner 上 Node / pnpm 是「常駐」的,不像 hosted 每次全新;
      #    corepack enable 仍能確保用到的是 packageManager 指定的版本。
      - name: Enable Corepack (pin pnpm to packageManager field)
        run: corepack enable

      # 3) 安裝相依。--frozen-lockfile 嚴格依 lockfile,保證可重現。
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4) Build 主站(Next.js output:'export')→ 產出 apps/main/out。
      - name: Build (main)
        run: pnpm --filter main run build

      # 5) 安裝 Puppeteer 的 Chrome。
      #    workspace 設定刻意「不在 install 期下載 Chromium」(allowBuilds.puppeteer=false),
      #    所以這裡明確抓一份。產 PDF 用得到,CI 驗證階段用不到(故只在部署做)。
      - name: Install Chrome for Puppeteer
        run: npx puppeteer browsers install chrome

      # 6) 用本機靜態伺服器把剛 build 出來的 out/ 跑起來,讓 generate-pdf 有東西可載。
      #    generate-pdf.mjs 預設打 http://localhost:3000,但用 BASE_URL 可覆寫;
      #    這裡用 4173,避免和主機上可能存在的其他服務撞 port。
      #    npx serve 把 out/ 當靜態站起在背景(&),記下 PID 等等收掉。
      #    --single 讓深連結回退 index.html(對齊 Caddy 的 try_files 行為)。
      - name: Serve out/ for PDF generation
        run: |
          npx --yes serve apps/main/out --listen 4173 --single &
          echo "SERVE_PID=$!" >> "$GITHUB_ENV"
          # 等待伺服器就緒(最多約 30 秒),就緒就往下走。
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null "http://localhost:4173/"; then
              echo "static server ready"
              break
            fi
            sleep 1
          done

      # 7) 產生 PDF 履歷(zh / en)。
      #    generate-pdf.mjs 會把 PDF 寫到 apps/main/public/(resume-zh.pdf、resume-en.pdf)。
      #    BASE_URL 指向上一步的本機伺服器。
      - name: Generate resume PDFs
        env:
          BASE_URL: "http://localhost:4173"
        run: pnpm --filter main run generate-pdf

      # 8) 把產出的 PDF 併入 out/。
      #    重點:public/ 只有在「next build 當下」才會被複製進 out/;PDF 是 build 之後
      #    才產生的,所以必須手動 copy 進 apps/main/out,部署出去才有得下載。
      - name: Merge PDFs into out/
        run: |
          cp apps/main/public/resume-zh.pdf apps/main/out/resume-zh.pdf
          cp apps/main/public/resume-en.pdf apps/main/out/resume-en.pdf

      # 9) 收掉背景靜態伺服器(無論前面成敗都嘗試收,避免殘留行程佔 port)。
      - name: Stop static server
        if: always()
        run: |
          if [ -n "${SERVE_PID:-}" ]; then
            kill "$SERVE_PID" 2>/dev/null || true
          fi

      # 10) 部署:呼叫 infra/scripts/deploy-static.sh。
      #     腳本介面(見該檔註解):
      #         ./deploy-static.sh <app_name> [src_dir] [dest_dir] [health_host]
      #     這裡只給 app_name="main",其餘全用腳本預設:
      #         src_dir     → apps/main/out          (相對路徑,故必須在 repo 根目錄執行)
      #         dest_dir    → /srv/main              (Caddy 主站 root)
      #         health_host → $DOMAIN(main 用裸網域)
      #     腳本內部:rsync -a --delete out/ → /srv/main/,再帶 Host 打 127.0.0.1:8080/healthz,
      #     非 200 即非零退出 → 本 step 失敗 → 部署被標記失敗。
      #
      #     DOMAIN:腳本預設健康檢查的 Host 是 YOUR_DOMAIN 佔位符。請在 runner 環境設定
      #     真實網域(下方用 repo/環境變數 vars.DOMAIN 帶入;若未設定則沿用腳本內預設)。
      #     設定方式見 docs/20「環境變數 / secrets」一節。
      - name: Deploy to /srv/main + health check
        env:
          DOMAIN: ${{ vars.DOMAIN }}
        run: |
          chmod +x infra/scripts/deploy-static.sh
          ./infra/scripts/deploy-static.sh main
